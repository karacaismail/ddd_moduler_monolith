<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Framework Master — JSON-driven render</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap&subset=latin,latin-ext" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar__brand">
      <i class="ph-duotone ph-stack"></i>
      <span>Framework Master</span>
    </div>
    <div id="search-box" class="search-box"></div>
    <nav id="toc" class="toc"></nav>
    <aside class="sidebar__gran-legend" aria-label="Kilometre taşları">
      <div class="sidebar__gran-legend__title">Kilometre taşları (SP)</div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-mountains"></i> Kaya <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~89</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-cube"></i> Büyük taş <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~34</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-square"></i> Orta taş <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~13</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-squares-four"></i> Küçük taş <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~5</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-dots-nine"></i> Kum tanesi <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~2</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-dot-outline"></i> Toz tanesi <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~1</span></div>
      <div class="sidebar__gran-legend__row"><i class="ph ph-atom"></i> Atom <span style="margin-left:auto;font-size:.7rem;color:var(--ink-4)">~1</span></div>
    </aside>
    <div class="sidebar__footer">
      <a href="https://github.com" class="sidebar__link">LGPLv3</a>
    </div>
  </aside>

  <main id="main" class="main">
    <div id="hero" class="hero"></div>
    <div id="filter-bar" class="filter-bar"></div>
    <div id="content" class="content">
      <div class="loading">
        <i class="ph ph-circle-notch ph-spin"></i>
        <span>İçerik yükleniyor…</span>
      </div>
    </div>
  </main>

  <aside id="detail-panel" class="detail-panel" aria-label="Detay paneli">
    <div class="detail-panel__inner">
      <div class="detail-panel__placeholder">
        <i class="ph-duotone ph-cursor-click"></i>
        <div class="detail-panel__placeholder-title">Bir karta tıkla</div>
        <p>Soldaki herhangi bir konu veya alana tıklayınca; <strong>detaylı açıklama</strong>, <strong>terim sözlüğü</strong> ve <strong>gerçek dünya örnekleri</strong> burada görünür.</p>
      </div>
    </div>
  </aside>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
